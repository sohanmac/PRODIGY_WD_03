<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Find More</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <h1>Find More</h1>
      <p>Your neighborhood marketplace.</p>
    </div>
    <a href="index.html" class="secondary-btn">Back to store</a>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h2>Create an account</h2>
      <p class="auth-intro">Join the community and discover products from nearby stores.</p>

      <form id="registerForm" class="auth-form">
        <label>
          Full name
          <input type="text" id="registerName" autocomplete="name" placeholder="Your full name" minlength="2" required />
        </label>
        <label>
          Email address
          <input type="email" id="registerEmail" autocomplete="email" placeholder="you@example.com" required />
        </label>
        <label>
          Password
          <input type="password" id="registerPassword" autocomplete="new-password" placeholder="At least 6 characters" minlength="6" required />
        </label>
        <label>
          Confirm password
          <input type="password" id="confirmPassword" autocomplete="new-password" placeholder="Enter password again" minlength="6" required />
        </label>
        <p id="formMessage" class="form-message" role="alert"></p>
        <button type="submit" class="primary-btn">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
