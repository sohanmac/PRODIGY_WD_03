<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Find More</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <h1>Find More</h1>
      <p>Your neighborhood marketplace.</p>
    </div>
    <a href="index.html" class="secondary-btn">Back to store</a>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-intro">Log in to continue shopping from your favorite local sellers.</p>

      <form id="loginForm" class="auth-form">
        <label>
          Email address
          <input type="email" id="loginEmail" autocomplete="email" placeholder="you@example.com" required />
        </label>
        <label>
          Password
          <input type="password" id="loginPassword" autocomplete="current-password" placeholder="Enter your password" required />
        </label>
        <p id="formMessage" class="form-message" role="alert"></p>
        <button type="submit" class="primary-btn">Login</button>
      </form>

      <p class="auth-switch">New to Find More? <a href="register.html">Create an account</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
